<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoolDrive — Sistema de Gestión</title>
    <meta name="description" content="Sistema de gestión para taller de aire acondicionado automotriz">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="login-screen" class="login-screen">
        <div class="login-bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        <div class="login-card">
            <div class="login-logo">
                <span class="material-icons-round logo-icon">ac_unit</span>
                <h1>CoolDrive</h1>
                <p>Conduce siempre fresco</p>
            </div>
            <form id="login-form" autocomplete="off">
                <div class="input-group">
                    <span class="material-icons-round input-icon">person</span>
                    <input type="text" id="login-username" placeholder="Usuario" required>
                </div>
                <div class="input-group">
                    <span class="material-icons-round input-icon">lock</span>
                    <input type="password" id="login-password" placeholder="Contraseña" required>
                </div>
                <div id="login-error" class="login-error" style="display:none"></div>
                <button type="submit" id="login-btn" class="btn-primary btn-login">
                    <span class="btn-text">Iniciar Sesión</span>
                    <span class="material-icons-round">arrow_forward</span>
                </button>
            </form>
        </div>
    </div>

    <!-- ==================== MAIN APP ==================== -->
    <div id="app" class="app" style="display:none">

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <span class="material-icons-round logo-icon-sm">ac_unit</span>
                <span class="sidebar-title">CoolDrive</span>
            </div>
            <ul class="nav-links">
                <li>
                    <a href="#" class="nav-link active" data-page="dashboard" id="nav-dashboard">
                        <span class="material-icons-round">dashboard</span>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-page="clientes" id="nav-clientes">
                        <span class="material-icons-round">people</span>
                        <span>Clientes</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-page="vehiculos" id="nav-vehiculos">
                        <span class="material-icons-round">directions_car</span>
                        <span>Vehículos</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-page="servicios" id="nav-servicios">
                        <span class="material-icons-round">build</span>
                        <span>Servicios</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-page="productos" id="nav-productos">
                        <span class="material-icons-round">inventory_2</span>
                        <span>Productos</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-page="facturas" id="nav-facturas">
                        <span class="material-icons-round">receipt_long</span>
                        <span>Facturas</span>
                    </a>
                </li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-info">
                    <span class="material-icons-round user-avatar">account_circle</span>
                    <div class="user-details">
                        <span id="user-name" class="user-name">Usuario</span>
                        <span id="user-role" class="user-role">Rol</span>
                    </div>
                </div>
                <button id="btn-logout" class="btn-logout" title="Cerrar Sesión">
                    <span class="material-icons-round">logout</span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main id="content" class="content">
            <!-- Pages are dynamically rendered here -->
        </main>
    </div>

    <!-- ==================== MODAL ==================== -->
    <div id="modal-overlay" class="modal-overlay" style="display:none">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h2 id="modal-title">Modal</h2>
                <button id="modal-close" class="modal-close">
                    <span class="material-icons-round">close</span>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Dynamic form content -->
            </div>
        </div>
    </div>

    <!-- ==================== TOAST ==================== -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/clientes.js"></script>
    <script src="js/vehiculos.js"></script>
    <script src="js/servicios.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/facturas.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
